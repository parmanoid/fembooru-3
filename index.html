<!DOCTYPE html>
<html>
<head>
  <title>TinyBooru - Firebase Edition</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    /* Оригинальный минималистичный стиль TinyBooru */
    body { background-color: #1a1a1a; color: #ddd; font-family: sans-serif; margin: 0; font-size: 14px; }
    .container { max-width: 1000px; margin: 0 auto; padding: 15px; }
    a { color: #4CAF50; text-decoration: none; }
    a:hover { text-decoration: underline; }
    
    /* Шапка и навигация */
    #head-container { border-bottom: 1px solid #333; margin-bottom: 20px; padding-bottom: 10px; }
    .nav-bar { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 10px; border-radius: 5px; margin-top: 10px; }
    .nav-bar input, .nav-bar button { padding: 6px 10px; background: #333; color: white; border: 1px solid #444; border-radius: 3px; font-size: 13px; }
    .nav-bar button { cursor: pointer; transition: 0.2s; }
    .nav-bar button:hover { background: #444; }
    
    /* Специфичные кнопки */
    #btn-upload { background-color: #4CAF50; border-color: #4CAF50; font-weight: bold; }
    #btn-upload:hover { background-color: #45a049; }
    #btn-logout { background-color: #d32f2f; border-color: #d32f2f; }
    
    /* Статусы */
    #status-msg { color: #ffeb3b; font-size: 13px; margin-left: 10px; }
    #auth-error { color: #ff5252; font-size: 13px; margin-left: 10px; }

    /* Галерея */
    .gallery { display: flex; flex-wrap: wrap; gap: 12px; justify-content: flex-start; }
    .post { background: #222; padding: 8px; border-radius: 5px; border: 1px solid #333; width: 150px; text-align: center; }
    .post img { max-width: 150px; max-height: 150px; object-fit: cover; border-radius: 3px; }
    .post-author { font-size: 11px; color: #888; margin-top: 8px; overflow: hidden; text-overflow: ellipsis; }
  </style>
</head>
<body>

  <div id="head-container" class="container">
    <h2 style="margin: 0; color: #fff;">TinyBooru</h2>
    
    <div class="nav-bar">
      <div id="guest-ui">
        <input type="email" id="email" placeholder="Email" size="20">
        <input type="password" id="pass" placeholder="Пароль" size="20">
        <button id="btn-login">Вход</button>
        <button id="btn-reg">Регистрация</button>
        <span id="auth-error"></span>
      </div>

      <div id="user-ui" style="display:none; width: 100%; justify-content: space-between; align-items: center;">
        <div>
          <span style="color: #888;">Аккаунт: </span>
          <span id="user-email" style="font-weight: bold; color: #4CAF50; margin-right: 15px;"></span>
          <button id="btn-logout">Выйти</button>
        </div>
        <div>
          <input type="file" id="file-input" accept="image/*" style="width: 220px; border: none; background: transparent;">
          <button id="btn-upload">Загрузить арт</button>
          <span id="status-msg"></span>
        </div>
      </div>
    </div>
  </div>

  <div id="main-container" class="container">
    <div class="gallery" id="gallery-container">
      <p style="color: #888;">Загрузка постов...</p>
    </div>
  </div>

  <script type="module">
    // --- 1. ИНИЦИАЛИЗАЦИЯ БАЗЫ ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAu8tzzrqKizHt2_0_-6r6DJU02szqtgEA",
      authDomain: "fir-3fa84.firebaseapp.com",
      projectId: "fir-3fa84",
      storageBucket: "fir-3fa84.firebasestorage.app",
      messagingSenderId: "725404219596",
      appId: "1:725404219596:web:34ab5087aeed5b9bb1aa69",
      measurementId: "G-X25715CQHB"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const imgbbKey = "120a27bcbb28d3ffd9f03bc4b32bb54f";

    // --- 2. ЭЛЕМЕНТЫ ИНТЕРФЕЙСА ---
    const guestUi = document.getElementById('guest-ui');
    const userUi = document.getElementById('user-ui');
    const authError = document.getElementById('auth-error');
    const statusMsg = document.getElementById('status-msg');
    const gallery = document.getElementById('gallery-container');
    let currentUser = null;

    // --- 3. СЛУШАТЕЛЬ АВТОРИЗАЦИИ ---
    onAuthStateChanged(auth, (user) => {
      authError.innerText = ""; // Очищаем ошибки при смене статуса
      if (user) {
        currentUser = user;
        guestUi.style.display = 'none';
        userUi.style.display = 'flex';
        document.getElementById('user-email').innerText = user.email.split('@')[0]; // Показываем ник до @
      } else {
        currentUser = null;
        guestUi.style.display = 'block';
        userUi.style.display = 'none';
      }
    });

    // --- 4. ФУНКЦИИ АККАУНТА ---
    document.getElementById('btn-reg').addEventListener('click', () => {
      const e = document.getElementById('email').value;
      const p = document.getElementById('pass').value;
      if(e && p) createUserWithEmailAndPassword(auth, e, p).catch(err => authError.innerText = "Ошибка: " + err.message);
    });

    document.getElementById('btn-login').addEventListener('click', () => {
      const e = document.getElementById('email').value;
      const p = document.getElementById('pass').value;
      if(e && p) signInWithEmailAndPassword(auth, e, p).catch(err => authError.innerText = "Неверный логин или пароль");
    });

    document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

    // --- 5. ЗАГРУЗКА ФАЙЛОВ ---
    document.getElementById('btn-upload').addEventListener('click', async () => {
      const file = document.getElementById('file-input').files[0];
      if(!file) { statusMsg.innerText = "Выберите файл!"; return; }

      statusMsg.innerText = "Загрузка на сервер...";
      document.getElementById('btn-upload').disabled = true;

      const formData = new FormData();
      formData.append('image', file);
      formData.append('key', imgbbKey);

      try {
        const res = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: formData }).then(r => r.json());
        if(!res.success) throw new Error("Ошибка ImgBB");

        statusMsg.innerText = "Добавление в базу...";
        await push(ref(db, 'posts'), {
          file_url: res.data.url,
          preview_url: res.data.thumb.url,
          author: currentUser.email,
          timestamp: Date.now()
        });

        statusMsg.innerText = "Успешно!";
        document.getElementById('file-input').value = ""; // Очищаем поле
        setTimeout(() => statusMsg.innerText = "", 3000);
      } catch (err) {
        statusMsg.innerText = "Ошибка: " + err.message;
      } finally {
        document.getElementById('btn-upload').disabled = false;
      }
    });

    // --- 6. РЕНДЕР ГАЛЕРЕИ (РАБОТАЕТ ВСЕГДА) ---
    function loadGallery() {
      onValue(ref(db, 'posts'), (snapshot) => {
        gallery.innerHTML = "";
        const data = snapshot.val();
        
        if(!data) { 
          gallery.innerHTML = "<p style='color: #888;'>Здесь пока пусто. Станьте первым, кто добавит арт!</p>"; 
          return; 
        }

        // Превращаем объект в массив и сортируем новые посты наверх
        const postsArray = Object.values(data).sort((a, b) => b.timestamp - a.timestamp);
        
        postsArray.forEach(post => {
          const div = document.createElement('div');
          div.className = 'post';
          // Имя автора до символа @ для красоты
          const authorName = post.author ? post.author.split('@')[0] : 'Аноним'; 
          
          div.innerHTML = `
            <a href="${post.file_url}" target="_blank">
              <img src="${post.preview_url}" alt="art">
            </a>
            <div class="post-author">By: ${authorName}</div>
          `;
          gallery.appendChild(div);
        });
      });
    }

    // Запускаем загрузку галереи сразу при открытии сайта
    loadGallery();
  </script>
</body>
</html>
