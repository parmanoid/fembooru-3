<!DOCTYPE html>
<html manifest="offline.appcache">
  <head>
    <title>TinyBooru - The Tiny Booru Frontend</title>
    <meta charset="utf-8" />
    <meta name="author" content="urain39" />
    <meta name="keywords" content="Booru, TinyBooru, SafeBooru" />
    <meta name="description" content="The Tiny Booru Frontend" />
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, width=device-width">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
    <link href="css/style.css" rel="stylesheet">
    <style>
      #upload-modal { display:none; position:fixed; bottom:20px; right:20px; background:#222; color:#fff; padding:20px; border-radius:10px; box-shadow:0 0 10px #000; z-index:9999; }
      #upload-modal input, #upload-modal button { margin-top:10px; width:100%; display:block; padding:8px; }
      #upload-toggle { position:fixed; bottom:20px; right:20px; padding:12px 24px; background:#4CAF50; color:white; border:none; border-radius:5px; cursor:pointer; z-index:9998; font-weight:bold; }
    </style>
  </head>
  <body>
    <button id="upload-toggle" onclick="document.getElementById('upload-modal').style.display='block'; this.style.display='none';">Загрузить файл</button>
    <div id="upload-modal">
      <h3 style="margin-top:0">Новый пост</h3>
      <input type="file" id="file-input" accept="image/*,video/*">
      <button onclick="uploadMagic()">Отправить</button>
      <p id="upload-status"></p>
      <button onclick="document.getElementById('upload-modal').style.display='none'; document.getElementById('upload-toggle').style.display='block';" style="background:#d32f2f; color:white; margin-top:15px;">Закрыть</button>
    </div>

    <script>
      var IMGBB_API = "120a27bcbb28d3ffd9f03bc4b32bb54f";
      var GH_USER = "parmanoid";
      var GH_REPO = "fembooru-3"; 
      var GH_TOKEN = "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";

      function encodeUTF8(str) { return btoa(unescape(encodeURIComponent(str))); }
      function decodeUTF8(str) { return decodeURIComponent(escape(atob(str))); }

      async function uploadMagic() {
        var file = document.getElementById('file-input').files[0];
        var status = document.getElementById('upload-status');
        if(!file) { status.innerText = "Выбери файл!"; return; }

        var isVideo = file.type.startsWith('video/');
        var fileUrl = "";
        var thumbUrl = "";

        try {
          if (isVideo) {
            status.innerText = "Шаг 1: Загрузка видео на Catbox...";
            var formData = new FormData();
            formData.append('reqtype', 'fileupload');
            formData.append('fileToUpload', file);
            
            var catboxRes = await fetch('https://catbox.moe/user/api.php', { method: 'POST', body: formData }).then(r => r.text());
            if(!catboxRes.startsWith("http")) throw new Error("Catbox отклонил файл");
            
            fileUrl = catboxRes;
            thumbUrl = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='150' height='150'><rect width='150' height='150' fill='%23333'/><text x='50%' y='50%' fill='white' font-size='60' text-anchor='middle' dominant-baseline='middle'>▶</text></svg>";
          } else {
            status.innerText = "Шаг 1: Загрузка картинки на ImgBB...";
            var formData = new FormData();
            formData.append('image', file);
            formData.append('key', IMGBB_API);
            
            var imgRes = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: formData }).then(r => r.json());
            if(!imgRes.success) throw new Error("ImgBB отклонил картинку");
            
            fileUrl = imgRes.data.url;
            thumbUrl = imgRes.data.thumb.url;
          }

          var newPost = {
            file_url: fileUrl,
            preview_url: thumbUrl,
            preview_width: 150,
            preview_height: 150,
            tags: isVideo ? "video my_upload" : "image my_upload"
          };

          status.innerText = "Шаг 2: Получаем базу с Github...";
          var ghUrl = "https://api.github.com/repos/" + GH_USER + "/" + GH_REPO + "/contents/posts.json";
          var headers = { "Authorization": "token " + GH_TOKEN, "Accept": "application/vnd.github.v3+json" };
          
          var fileRes = await fetch(ghUrl, { headers: headers }).then(r => r.json());
          var posts = [];
          var sha = "";
          
          if(fileRes.content) {
            posts = JSON.parse(decodeUTF8(fileRes.content));
            sha = fileRes.sha;
          }
          
          posts.unshift(newPost);

          status.innerText = "Шаг 3: Сохраняем обратно...";
          var updateData = {
            message: "Авто-загрузка файла",
            content: encodeUTF8(JSON.stringify(posts, null, 2)),
            sha: sha
          };

          await fetch(ghUrl, { method: "PUT", headers: headers, body: JSON.stringify(updateData) });

          status.innerText = "Готово! Обновляю страницу...";
          setTimeout(() => location.reload(), 1500);

        } catch (e) {
          status.innerText = "Ошибка: " + e.message;
        }
      }
    </script>
    <div id="viewport"></div>
    <script id="viewport-tpl" type="text/x-template">
      <div id="head-container" class="container">
        <div id="title-wrapper">
          {#helpers.title}{-- This just a test, do not ask me why! --}
        </div>
        <div class="search-bar">
          <button id="btn-search" class="btn">Search</button>
          {?params.page}
            {-}<input id="search-box" type="text" size="8" value="{params.tags}">
          {/params.page}
        </div>
        <div class="nav-bar">
          {?params.page}
            <a id="btn-prev-page" href="#!">Prev</a>
            <span>{params.page}</span>
            <a id="btn-next-page" href="#!">Next</a>
          {*params.page}
            {-- page 0 --}
            <a href="#!">Help</a><a href="#!">About</a>
            <a href="mailto:hexiedeshijie@gmail.com">Contact</a>
          {/params.page}
        </div>
      </div>
      <div id="main-container" class="container">
        {-}{@post-viewer-tpl}
      </div>
      <div id="footer-container" class="container">
        <section>
          &copy; 2018-{helpers.fullYear} TinyBooru. 由ij2tpl.js走心驱动。
        </section>
      </div>
    </script>
    <script src="js/lib/vconsole.min.js"></script>
    <script src="js/lib/jquery.min.js"></script>
    <script src="js/lib/waiter.min.js"></script>
    <script src="js/lib/ij2tpl.min.js"></script>
    <script src="js/lib/format.js"></script>
    <script src="js/tinybooru.js"></script>
  </body>
</html>
