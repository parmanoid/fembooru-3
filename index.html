<!DOCTYPE html>
<html>
<head>
  <title>My Firebase Booru</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { background-color: #222; color: #eee; font-family: sans-serif; margin: 0; padding: 20px; }
    input, button { padding: 10px; margin: 5px 0; border-radius: 5px; border: none; }
    input { width: 100%; max-width: 300px; box-sizing: border-box; }
    button { background-color: #4CAF50; color: white; cursor: pointer; font-weight: bold; }
    .panel { background: #333; padding: 20px; border-radius: 10px; max-width: 400px; margin: 0 auto 20px auto; }
    #app-panel { max-width: 1000px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #444; }
    .gallery { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; }
    .post { background: #111; padding: 10px; border-radius: 8px; text-align: center; width: 170px; }
    .post img { max-width: 150px; max-height: 150px; border-radius: 5px; object-fit: cover; }
    .post-info { font-size: 12px; color: #888; margin-top: 5px; word-break: break-all; }
  </style>
</head>
<body>

  <div id="auth-panel" class="panel">
    <h2>Вход в систему</h2>
    <input type="email" id="email" placeholder="Твоя почта">
    <input type="password" id="pass" placeholder="Пароль">
    <br>
    <button id="btn-login">Войти</button>
    <button id="btn-reg" style="background-color: #2196F3;">Зарегистрироваться</button>
    <p id="auth-error" style="color: #ff5252; font-size: 14px;"></p>
  </div>

  <div id="app-panel" style="display:none;">
    <div class="header">
      <div>
        <span id="user-email" style="font-weight: bold; color: #4CAF50; margin-right: 15px;"></span>
        <button id="btn-logout" style="background-color: #d32f2f;">Выйти</button>
      </div>
      <div>
        <input type="file" id="file-input" accept="image/*" style="display:inline-block; width:auto;">
        <button id="btn-upload">Загрузить арт</button>
      </div>
    </div>
    <p id="upload-status" style="color: #ffeb3b; text-align: right;"></p>
    
    <div class="gallery" id="gallery-container">
      <p>Загрузка постов...</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAu8tzzrqKizHt2_0_-6r6DJU02szqtgEA",
      authDomain: "fir-3fa84.firebaseapp.com",
      projectId: "fir-3fa84",
      storageBucket: "fir-3fa84.firebasestorage.app",
      messagingSenderId: "725404219596",
      appId: "1:725404219596:web:34ab5087aeed5b9bb1aa69",
      measurementId: "G-X25715CQHB"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const imgbbKey = "120a27bcbb28d3ffd9f03bc4b32bb54f";

    const authPanel = document.getElementById('auth-panel');
    const appPanel = document.getElementById('app-panel');
    const authError = document.getElementById('auth-error');
    const uploadStatus = document.getElementById('upload-status');
    const gallery = document.getElementById('gallery-container');
    let currentUser = null;

    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        authPanel.style.display = 'none';
        appPanel.style.display = 'block';
        document.getElementById('user-email').innerText = user.email;
        loadPosts();
      } else {
        currentUser = null;
        authPanel.style.display = 'block';
        appPanel.style.display = 'none';
      }
    });

    document.getElementById('btn-reg').onclick = () => {
      const e = document.getElementById('email').value;
      const p = document.getElementById('pass').value;
      createUserWithEmailAndPassword(auth, e, p).catch(err => authError.innerText = err.message);
    };

    document.getElementById('btn-login').onclick = () => {
      const e = document.getElementById('email').value;
      const p = document.getElementById('pass').value;
      signInWithEmailAndPassword(auth, e, p).catch(err => authError.innerText = err.message);
    };

    document.getElementById('btn-logout').onclick = () => signOut(auth);

    document.getElementById('btn-upload').onclick = async () => {
      const file = document.getElementById('file-input').files[0];
      if(!file) { uploadStatus.innerText = "Сначала выбери файл"; return; }

      uploadStatus.innerText = "Грузим на ImgBB...";
      const formData = new FormData();
      formData.append('image', file);
      formData.append('key', imgbbKey);

      try {
        const res = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: formData }).then(r => r.json());
        if(!res.success) throw new Error("Ошибка загрузки");

        uploadStatus.innerText = "Сохраняем в базу...";
        const postsRef = ref(db, 'posts');
        await push(postsRef, {
          file_url: res.data.url,
          preview_url: res.data.thumb.url,
          author: currentUser.email,
          timestamp: Date.now()
        });

        uploadStatus.innerText = "Готово!";
        document.getElementById('file-input').value = "";
        setTimeout(() => uploadStatus.innerText = "", 3000);
      } catch (err) {
        uploadStatus.innerText = "Ошибка: " + err.message;
      }
    };

    function loadPosts() {
      const postsRef = ref(db, 'posts');
      onValue(postsRef, (snapshot) => {
        gallery.innerHTML = "";
        const data = snapshot.val();
        if(!data) { gallery.innerHTML = "<p>Пока нет постов</p>"; return; }

        const postsArray = Object.values(data).sort((a, b) => b.timestamp - a.timestamp);
        
        postsArray.forEach(post => {
          const div = document.createElement('div');
          div.className = 'post';
          div.innerHTML = `
            <a href="${post.file_url}" target="_blank">
              <img src="${post.preview_url}">
            </a>
            <div class="post-info">От: ${post.author.split('@')[0]}</div>
          `;
          gallery.appendChild(div);
        });
      });
    }
  </script>
</body>
</html>
