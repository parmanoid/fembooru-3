<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Завантаження</title>
</head>
<body>
  <h2>Завантаження на ImgBB</h2>
  <input type="file" id="file">
  <button onclick="up()">Завантажити</button>
  <pre id="res" style="background:#eee; padding:10px; margin-top:10px; border-radius:5px;"></pre>
  <script>
    function up() {
      var f = document.getElementById('file').files[0];
      if(!f) return;
      var data = new FormData();
      data.append('image', f);
      data.append('key', '120a27bcbb28d3ffd9f03bc4b32bb54f');
      document.getElementById('res').innerText = 'Завантажуємо...';
      fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: data })
      .then(r => r.json())
      .then(d => {
        if(d.success) {
          var t = '  {\n    "file_url": "' + d.data.url + '",\n    "preview_url": "' + d.data.thumb.url + '",\n    "preview_width": 150,\n    "preview_height": 150,\n    "tags": "my_upload"\n  },';
          document.getElementById('res').innerText = t;
        } else {
          document.getElementById('res').innerText = 'Помилка завантаження';
        }
      });
    }
  </script>
</body>
</html>
